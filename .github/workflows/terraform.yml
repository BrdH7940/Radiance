name: Terraform — CI

on:
    pull_request:
        paths:
            - 'infra/**'
    push:
        branches: [main]
        paths:
            - 'infra/**'
    workflow_dispatch: {}

env:
    TF_IN_AUTOMATION: '1'

jobs:
    fmt-validate-plan:
        name: Format / Validate / Plan (PRs)
        runs-on: ubuntu-latest
        environment: env
        permissions:
            contents: read
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
        steps:
            - uses: actions/checkout@v4

            # CRITICAL: Tạo dependencies (S3, DynamoDB, ECR) trước khi Terraform chạy
            - name: Bootstrap infrastructure dependencies
              run: |
                  echo "Checking Terraform backend dependencies..."
                  REGION=$AWS_REGION

                  # 1. Tạo S3 Bucket cho Backend nếu chưa có
                  BUCKET_NAME="radiance-s3"
                  if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
                    echo "Bucket $BUCKET_NAME missing. Creating..."
                    
                    # Lệnh tạo bucket (lưu ý: us-east-1 không cần LocationConstraint)
                    if [ "$REGION" == "us-east-1" ]; then
                      aws s3 mb s3://$BUCKET_NAME --region $REGION
                    else
                      aws s3 mb s3://$BUCKET_NAME --region $REGION --create-bucket-configuration LocationConstraint=$REGION
                    fi
                    
                    # Bật Versioning để an toàn cho file state
                    aws s3api put-bucket-versioning --bucket $BUCKET_NAME --versioning-configuration Status=Enabled
                    
                    # Bật Encryption (Mã hóa)
                    aws s3api put-bucket-encryption --bucket $BUCKET_NAME --server-side-encryption-configuration '{"Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]}'
                    
                    echo "✓ S3 Bucket created and configured"
                  else
                    echo "✓ S3 Bucket already exists"
                  fi

                  # 2. Create DynamoDB lock table if not exists
                  if ! aws dynamodb describe-table --table-name terraform_locks --region $REGION 2>/dev/null; then
                    echo "Creating terraform_locks table..."
                    aws dynamodb create-table \
                      --table-name terraform_locks \
                      --attribute-definitions AttributeName=LockID,AttributeType=S \
                      --key-schema AttributeName=LockID,KeyType=HASH \
                      --billing-mode PAY_PER_REQUEST \
                      --region $REGION
                    
                    aws dynamodb wait table-exists --table-name terraform_locks --region $REGION
                    echo "✓ Lock table created"
                  else
                    echo "✓ Lock table already exists"
                  fi

                  # 3. Create ECR repository if not exists (Giữ nguyên logic cũ của bạn)
                  REPO_NAME="radiance-backend-image"
                  if ! aws ecr describe-repositories --repository-names $REPO_NAME --region $REGION 2>/dev/null; then
                    aws ecr create-repository --repository-name $REPO_NAME --region $REGION
                    echo "✓ ECR repository created"
                  fi

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            - name: Cache .terraform
              uses: actions/cache@v4
              with:
                  path: infra/.terraform
                  key: ${{ runner.os }}-tf-${{ hashFiles('infra/**.tf*') }}

            - name: Terraform fmt
              working-directory: infra
              run: terraform fmt

            - name: Terraform init
              working-directory: infra
              run: terraform init -input=false

            - name: Terraform validate
              working-directory: infra
              run: terraform validate

            - name: Terraform plan
              working-directory: infra
              run: terraform plan -out=tfplan -input=false

            - name: Verify generated plan
              working-directory: infra
              run: |
                  echo "Checking infra/tfplan exists..."
                  if [ ! -f tfplan ]; then
                    echo "ERROR: Terraform plan not created (infra/tfplan missing)."
                    ls -la .
                    exit 1
                  fi
                  echo "Plan created: $(stat -c'%n %s bytes' tfplan)"

            - name: Upload plan artifact
              uses: actions/upload-artifact@v4
              with:
                  name: tfplan
                  path: infra/tfplan

    apply-prod:
        name: Apply (manual / protected)
        runs-on: ubuntu-latest
        needs: fmt-validate-plan
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        environment: env
        permissions:
            contents: read
            actions: write
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
        steps:
            - uses: actions/checkout@v4

            - name: Bootstrap Backend (S3 & Lock ONLY)
              run: |
                  REGION=$AWS_REGION
                  BUCKET="radiance-s3"
                  # Chỉ tạo những thứ Terraform CẦN để khởi tạo (S3 & DynamoDB Lock)
                  aws s3api head-bucket --bucket $BUCKET 2>/dev/null || aws s3 mb s3://$BUCKET --region $REGION
                  aws dynamodb describe-table --table-name terraform_locks 2>/dev/null || \
                    aws dynamodb create-table --table-name terraform_locks \
                    --attribute-definitions AttributeName=LockID,AttributeType=S \
                    --key-schema AttributeName=LockID,KeyType=HASH \
                    --billing-mode PAY_PER_REQUEST --region $REGION

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            - name: Terraform Init
              working-directory: infra
              run: terraform init -input=false

            # BƯỚC QUAN TRỌNG: Chỉ tạo ECR trước để lấy chỗ push image
            - name: Terraform Apply ECR only
              working-directory: infra
              run: terraform apply -target=aws_ecr_repository.backend -auto-approve

            - name: Push Placeholder Image
              run: |
                  # Lấy URL ECR từ output của bước trên hoặc CLI
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  # Lưu ý: Tên repo phải khớp với var.ecr_repo_name trong Terraform
                  REPO_NAME="radiance-backend-image" 
                  ECR_URI="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$REPO_NAME"

                  aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_URI
                  echo "FROM public.ecr.aws/lambda/python:3.11" > Dockerfile.placeholder
                  docker build -t $ECR_URI:latest -f Dockerfile.placeholder .
                  docker push $ECR_URI:latest

            # Cuối cùng mới Apply toàn bộ (Lambda sẽ tìm thấy image đã push)
            - name: Terraform Apply Full
              working-directory: infra
              run: terraform apply -auto-approve
