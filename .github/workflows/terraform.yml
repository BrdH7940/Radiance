name: Terraform — CI

on:
    pull_request:
        paths:
            - 'infra/**'
    push:
        branches: [main]
        paths:
            - 'infra/**'
    workflow_dispatch: {}

env:
    TF_IN_AUTOMATION: '1'

jobs:
    fmt-validate-plan:
        name: Format / Validate / Plan (PRs)
        runs-on: ubuntu-latest
        environment: env
        permissions:
            contents: read
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
        steps:
            - uses: actions/checkout@v4

            # CRITICAL: Tạo dependencies trước khi Terraform chạy
            - name: Bootstrap infrastructure dependencies
              run: |
                  echo "Creating Terraform backend dependencies..."

                  # 1. Create DynamoDB lock table if not exists
                  if ! aws dynamodb describe-table --table-name terraform_locks --region $AWS_REGION 2>/dev/null; then
                    echo "Creating terraform_locks table..."
                    aws dynamodb create-table \
                      --table-name terraform_locks \
                      --attribute-definitions AttributeName=LockID,AttributeType=S \
                      --key-schema AttributeName=LockID,KeyType=HASH \
                      --billing-mode PAY_PER_REQUEST \
                      --region $AWS_REGION
                    
                    echo "Waiting for table to be active..."
                    aws dynamodb wait table-exists --table-name terraform_locks --region $AWS_REGION
                    echo "Lock table created successfully"
                  else
                    echo "Lock table already exists"
                  fi

                  # 2. Create ECR repository if not exists
                  if ! aws ecr describe-repositories --repository-names radiance-backend-image --region $AWS_REGION 2>/dev/null; then
                    echo "Creating ECR repository..."
                    aws ecr create-repository \
                      --repository-name radiance-backend-image \
                      --image-scanning-configuration scanOnPush=true \
                      --region $AWS_REGION
                    echo "ECR repository created"
                  else
                    echo "ECR repository already exists"
                  fi

                  # 3. Push placeholder image if not exists
                  if ! aws ecr describe-images --repository-name radiance-backend-image --image-ids imageTag=latest --region $AWS_REGION 2>/dev/null; then
                    echo "Pushing placeholder image..."
                    
                    # Login to ECR
                    aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_REGION.amazonaws.com
                    
                    # Create minimal placeholder
                    cat > Dockerfile.placeholder <<'EOF'
                  FROM public.ecr.aws/lambda/python:3.11
                  CMD ["lambda_function.lambda_handler"]
                  EOF
                    
                    ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                    ECR_URI="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/radiance-backend-image:latest"
                    
                    docker build -t $ECR_URI -f Dockerfile.placeholder .
                    docker push $ECR_URI
                    echo "Placeholder image pushed"
                  else
                    echo "Placeholder image already exists"
                  fi

                  echo "Bootstrap completed successfully"

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            - name: Cache .terraform
              uses: actions/cache@v4
              with:
                  path: infra/.terraform
                  key: ${{ runner.os }}-tf-${{ hashFiles('infra/**.tf*') }}

            - name: Terraform fmt
              working-directory: infra
              run: terraform fmt

            - name: Terraform init
              working-directory: infra
              run: terraform init -input=false

            - name: Terraform validate
              working-directory: infra
              run: terraform validate

            - name: Terraform plan
              working-directory: infra
              run: terraform plan -out=tfplan -input=false

            - name: Verify generated plan
              working-directory: infra
              run: |
                  echo "Checking infra/tfplan exists..."
                  if [ ! -f tfplan ]; then
                    echo "ERROR: Terraform plan not created (infra/tfplan missing)."
                    ls -la .
                    exit 1
                  fi
                  echo "Plan created: $(stat -c'%n %s bytes' tfplan)"

            - name: Upload plan artifact
              uses: actions/upload-artifact@v4
              with:
                  name: tfplan
                  path: infra/tfplan

    apply-prod:
        name: Apply (manual / protected)
        runs-on: ubuntu-latest
        needs: fmt-validate-plan
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        environment: env
        permissions:
            contents: read
            actions: write
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
        steps:
            - uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            - name: Prevent isolated re-run of Apply
              run: |
                  echo "GITHUB_RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT:-1}"
                  if [ "${GITHUB_RUN_ATTEMPT:-1}" != "1" ]; then
                    echo "::error::This job appears to be a re-run (GITHUB_RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT}). Artifacts from the original run are NOT available when re-running a single job."
                    echo "To proceed: re-run the entire workflow or re-run the 'fmt-validate-plan' job so the plan artifact is produced in this run."
                    exit 1
                  fi

            - name: Download plan
              uses: actions/download-artifact@v4
              with:
                  name: tfplan
                  path: infra

            - name: Unpack/normalize downloaded plan
              run: |
                  echo "Listing infra/ after download:"
                  ls -la infra || true
                  if [ -f infra/tfplan ]; then
                    echo "Plan found at infra/tfplan"
                  elif [ -f infra/tfplan/tfplan ]; then
                    echo "Nested plan found at infra/tfplan/tfplan — moving to infra/tfplan"
                    mv infra/tfplan/tfplan infra/tfplan
                  else
                    echo "ERROR: Plan artifact not found. Ensure the 'fmt-validate-plan' job produced and uploaded the plan in the same workflow run."
                    ls -la
                    exit 1
                  fi

            - name: Terraform init
              working-directory: infra
              run: terraform init -input=false

            - name: Terraform apply (uses plan)
              working-directory: infra
              run: terraform apply -input=false -auto-approve tfplan
