name: Terraform — Destroy Infrastructure

on:
    workflow_dispatch:
        inputs:
            confirm_destroy:
                description: 'Type "DESTROY" to confirm'
                required: true
                type: string

jobs:
    destroy:
        name: Destroy all infrastructure
        runs-on: ubuntu-latest
        environment: env
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
        steps:
            - name: Validate confirmation
              run: |
                  if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
                    echo "::error::Confirmation failed. You must type 'DESTROY' to proceed."
                    exit 1
                  fi

            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            # FIX 1: Dùng lệnh delete-repository --force để nuke sạch ECR
            - name: Force delete ECR Repository
              run: |
                  REPO_NAME=$(grep "ecr_repo_name" infra/terraform.tfvars | cut -d'=' -f2 | tr -d '" ' || echo "radiance-backend")
                  echo "Attempting to force delete ECR repo: $REPO_NAME"

                  aws ecr delete-repository \
                    --repository-name $REPO_NAME \
                    --force 2>/dev/null || echo "Repo already gone or not found."

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            # FIX 2: Đảm bảo DynamoDB lock table không chặn việc destroy
            - name: Ensure DynamoDB lock table exists
              run: |
                  aws dynamodb describe-table --table-name terraform_locks 2>/dev/null || {
                      aws dynamodb create-table \
                          --table-name terraform_locks \
                          --attribute-definitions AttributeName=LockID,AttributeType=S \
                          --key-schema AttributeName=LockID,KeyType=HASH \
                          --billing-mode PAY_PER_REQUEST
                      aws dynamodb wait table-exists --table-name terraform_locks
                  }

            - name: Terraform init
              working-directory: infra
              run: terraform init -reconfigure -input=false

            - name: Terraform destroy
              working-directory: infra
              run: terraform destroy -auto-approve

            # FIX 3: Cải tiến phần kiểm tra sau khi xóa
            - name: Cleanup verification
              run: |
                  echo "=== Post-Destroy Check ==="

                  # Check ECR - liệt kê để xem còn cái nào liên quan không
                  REPOS=$(aws ecr describe-repositories --query 'repositories[*].repositoryName' --output text | grep "radiance" || true)
                  [ -z "$REPOS" ] && echo "✓ All ECR repos cleared" || echo "⚠️ Remaining repos: $REPOS"

                  # Check S3
                  BUCKETS=$(aws s3 ls | grep "radiance" || true)
                  [ -z "$BUCKETS" ] && echo "✓ All S3 buckets cleared" || echo "⚠️ Remaining buckets: $BUCKETS"

                  # Check Lambda
                  LAMBDAS=$(aws lambda list-functions --query 'Functions[*].FunctionName' --output text | grep "radiance" || true)
                  [ -z "$LAMBDAS" ] && echo "✓ All Lambdas cleared" || echo "⚠️ Remaining lambdas: $LAMBDAS"
