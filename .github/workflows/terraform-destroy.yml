name: Terraform — Destroy Infrastructure

on:
    workflow_dispatch:
        inputs:
            confirm_destroy:
                description: 'Type "DESTROY" to confirm'
                required: true
                type: string

jobs:
    destroy:
        name: Destroy all infrastructure
        runs-on: ubuntu-latest
        environment: env
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
        steps:
            - name: Validate confirmation
              run: |
                  if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
                    echo "::error::Confirmation failed. You must type 'DESTROY' to proceed."
                    exit 1
                  fi

            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            # FIX 1: Dùng lệnh delete-repository --force để nuke sạch ECR
            - name: Force delete ECR Repository
              run: |
                  REPO_NAME=$(grep "ecr_repo_name" infra/terraform.tfvars | cut -d'=' -f2 | tr -d '" ' || echo "radiance-backend")
                  echo "Attempting to force delete ECR repo: $REPO_NAME"

                  aws ecr delete-repository \
                    --repository-name $REPO_NAME \
                    --force 2>/dev/null || echo "Repo already gone or not found."

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            # FIX 2: Đảm bảo DynamoDB lock table không chặn việc destroy
            - name: Ensure DynamoDB lock table exists
              run: |
                  aws dynamodb describe-table --table-name terraform_locks 2>/dev/null || {
                      aws dynamodb create-table \
                          --table-name terraform_locks \
                          --attribute-definitions AttributeName=LockID,AttributeType=S \
                          --key-schema AttributeName=LockID,KeyType=HASH \
                          --billing-mode PAY_PER_REQUEST
                      aws dynamodb wait table-exists --table-name terraform_locks
                  }

            - name: Terraform init
              working-directory: infra
              run: terraform init -reconfigure -input=false

            - name: Terraform destroy
              working-directory: infra
              run: terraform destroy -auto-approve

            # CHIÊU CUỐI: Xóa nốt những thứ Terraform không dám tự xóa
            - name: Nuke Backend Infrastructure (S3 & DynamoDB Lock)
              run: |
                  echo "=== FINAL CLEANUP: Backend Resources ==="

                  # 1. Xóa Backend S3 Bucket (Chứa file .tfstate)
                  # --force sẽ xóa toàn bộ version và file bên trong trước khi xóa bucket
                  BACKEND_BUCKET="radiance-s3"
                  echo "Deleting Backend Bucket: $BACKEND_BUCKET"
                  aws s3 rb s3://$BACKEND_BUCKET --force || echo "Backend bucket already deleted or not found."

                  # 2. Xóa DynamoDB Lock Table
                  LOCK_TABLE="terraform_locks"
                  echo "Deleting Lock Table: $LOCK_TABLE"
                  aws dynamodb delete-table --table-name $LOCK_TABLE 2>/dev/null || echo "Lock table already deleted."

                  # Đợi một chút để AWS cập nhật trạng thái xóa
                  sleep 10

            - name: Cleanup verification
              run: |
                  echo "=== FINAL VERIFICATION ==="

                  # Kiểm tra ECR
                  REPOS=$(aws ecr describe-repositories --query 'repositories[*].repositoryName' --output text | grep "radiance" || true)
                  [ -z "$REPOS" ] && echo "✓ ECR: Clean" || echo "⚠️ ECR still exists: $REPOS"

                  # Kiểm tra S3 (Tất cả bucket liên quan đến radiance)
                  BUCKETS=$(aws s3 ls | grep "radiance" || true)
                  if [ -z "$BUCKETS" ]; then
                    echo "✓ S3: Clean"
                  else
                    echo "⚠️ S3 still exists:"
                    echo "$BUCKETS"
                  fi

                  # Kiểm tra DynamoDB (Cả table data và table lock)
                  TABLES=$(aws dynamodb list-tables --query 'TableNames[*]' --output text | tr '\t' '\n' | grep -E "UserProfiles|terraform_locks" || true)
                  [ -z "$TABLES" ] && echo "✓ DynamoDB: Clean" || echo "⚠️ DynamoDB still exists: $TABLES"

                  # Kiểm tra Lambda
                  LAMBDAS=$(aws lambda list-functions --query 'Functions[*].FunctionName' --output text | grep "radiance" || true)
                  [ -z "$LAMBDAS" ] && echo "✓ Lambda: Clean" || echo "⚠️ Lambda still exists: $LAMBDAS"
