name: Terraform — Destroy Infrastructure

on:
    workflow_dispatch:
        inputs:
            confirm_destroy:
                description: 'Type "DESTROY" to confirm'
                required: true
                type: string

jobs:
    destroy:
        name: Destroy all infrastructure
        runs-on: ubuntu-latest
        environment: env
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
        steps:
            - uses: actions/checkout@v4
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2

            - name: Terraform Init & Destroy
              working-directory: infra
              run: |
                  terraform init -reconfigure
                  terraform destroy -auto-approve

            - name: FINAL NUKE (Clean everything else)
              run: |
                  echo "Cleaning up leftovers..."
                  # 1. Force delete ECR (nếu terraform destroy chưa xóa hết vì còn image)
                  REPO_NAME="radiance-backend-image"
                  aws ecr delete-repository --repository-name $REPO_NAME --force 2>/dev/null || true

                  # 2. Xóa Frontend Bucket (tìm theo prefix để chắc chắn sạch)
                  for bucket in $(aws s3 ls | grep radiance-frontend | awk '{print $3}'); do
                    aws s3 rb s3://$bucket --force
                  done

                  # 3. Xóa Backend S3 & DynamoDB (Cái này làm hỏng state nhưng bạn muốn sạch)
                  aws s3 rb s3://radiance-s3 --force 2>/dev/null || true
                  aws dynamodb delete-table --table-name terraform_locks 2>/dev/null || true

                  echo "✓ All infrastructure has been vaporized."
