name: Terraform — Destroy Infrastructure

on:
    workflow_dispatch:
        inputs:
            confirm_destroy:
                description: 'Type "DESTROY" to confirm'
                required: true
                type: string

jobs:
    destroy:
        name: Destroy all infrastructure
        runs-on: ubuntu-latest
        environment: env
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}

        steps:
            - name: Validate confirmation
              run: |
                  if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
                    echo "::error::Confirmation failed. You must type 'DESTROY' to proceed."
                    exit 1
                  fi
                  echo "✓ Confirmation validated"

            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            # FIX 1: Delete ECR images first
            - name: Delete ECR images
              run: |
                  echo "Checking for ECR images..."

                  IMAGE_IDS=$(aws ecr list-images \
                      --repository-name radiance-backend-image \
                      --query 'imageIds[*]' \
                      --output json 2>/dev/null || echo "[]")

                  if [ "$IMAGE_IDS" != "[]" ] && [ "$IMAGE_IDS" != "null" ]; then
                      echo "Deleting $(echo $IMAGE_IDS | jq 'length') images..."
                      aws ecr batch-delete-image \
                          --repository-name radiance-backend-image \
                          --image-ids "$IMAGE_IDS"
                      echo "✓ ECR images deleted"
                  else
                      echo "No images to delete"
                  fi
              continue-on-error: true

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            # FIX 2: Ensure lock table exists before init
            - name: Ensure DynamoDB lock table exists
              run: |
                  echo "Checking DynamoDB lock table..."

                  aws dynamodb describe-table \
                      --table-name terraform_locks 2>/dev/null && \
                  echo "✓ Lock table exists" || {
                      echo "Lock table missing, recreating..."
                      aws dynamodb create-table \
                          --table-name terraform_locks \
                          --attribute-definitions AttributeName=LockID,AttributeType=S \
                          --key-schema AttributeName=LockID,KeyType=HASH \
                          --billing-mode PAY_PER_REQUEST
                      
                      echo "Waiting for table to be active..."
                      aws dynamodb wait table-exists --table-name terraform_locks
                      echo "✓ Lock table recreated"
                  }
              continue-on-error: true

            - name: Terraform init
              working-directory: infra
              run: terraform init -reconfigure -input=false

            - name: Terraform destroy
              working-directory: infra
              run: terraform destroy -auto-approve

            - name: Cleanup verification
              run: |
                  echo ""
                  echo "=== Destroy Complete ==="
                  echo ""
                  echo "Remaining resources (if any):"

                  # Check Lambda
                  aws lambda get-function \
                      --function-name radiance-backend-api 2>/dev/null && \
                      echo "⚠️  Lambda still exists" || echo "✓ Lambda deleted"

                  # Check ECR
                  aws ecr describe-repositories \
                      --repository-names radiance-backend-image 2>/dev/null && \
                      echo "⚠️  ECR repository still exists" || echo "✓ ECR deleted"

                  # Check S3
                  BUCKETS=$(aws s3 ls | grep radiance-frontend || true)
                  if [ -n "$BUCKETS" ]; then
                      echo "⚠️  S3 buckets still exist: $BUCKETS"
                  else
                      echo "✓ S3 buckets deleted"
                  fi

                  # Check DynamoDB
                  aws dynamodb describe-table \
                      --table-name UserProfiles 2>/dev/null && \
                      echo "⚠️  UserProfiles table still exists" || echo "✓ UserProfiles deleted"

                  echo ""
                  echo "Note: terraform_locks table is intentionally kept for state management"
