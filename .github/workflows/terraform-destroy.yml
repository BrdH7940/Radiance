name: Terraform — Destroy Infrastructure

on:
    workflow_dispatch:
        inputs:
            confirm_destroy:
                description: 'Type "DESTROY" to confirm'
                required: true
                type: string

jobs:
    destroy:
        name: Destroy all infrastructure
        # Chỉ chạy nếu nhập đúng chữ DESTROY để tránh thảm họa nhầm lẫn
        if: github.event.inputs.confirm_destroy == 'DESTROY'
        runs-on: ubuntu-latest
        environment: env
        env:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2

            - name: Terraform Init & Destroy
              working-directory: infra
              continue-on-error: true # Nếu Terraform lỗi, vẫn chạy bước tiếp theo
              run: |
                  # 1. Khởi tạo lại, chấp nhận việc backend có thể đã mất
                  terraform init -reconfigure -input=false || true

                  # 2. Xóa với flag -lock=false để bỏ qua lỗi DynamoDB lock
                  # Sử dụng -refresh=false nếu state file cũng gặp vấn đề
                  terraform destroy -auto-approve -lock=false || echo "Terraform destroy failed, moving to manual nuke..."

            - name: TOTAL MANUAL NUKE (Càn quét toàn bộ tài nguyên)
              if: always()
              run: |
                  echo "🔥 Bắt đầu chiến dịch dọn dẹp cưỡng bức..."

                  # Function để xóa sạch Bucket kể cả khi có Versioning
                  nuke_s3_bucket() {
                    local bucket_name=$1
                    if aws s3api head-bucket --bucket "$bucket_name" 2>/dev/null; then
                      echo "Nuking bucket: $bucket_name"
                      # Xóa tất cả các phiên bản (versions)
                      aws s3api delete-objects --bucket "$bucket_name" \
                        --delete "$(aws s3api list-object-versions --bucket "$bucket_name" --output json --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}')" 2>/dev/null || true
                      
                      # Xóa tất cả các delete markers
                      aws s3api delete-objects --bucket "$bucket_name" \
                        --delete "$(aws s3api list-object-versions --bucket "$bucket_name" --output json --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}')" 2>/dev/null || true
                      
                      # Cuối cùng là xóa bucket
                      aws s3 rb "s3://$bucket_name" --force
                    fi
                  }

                  # 1. Xóa Lambda & ECR
                  aws lambda delete-function --function-name radiance-backend-api 2>/dev/null || true
                  aws ecr delete-repository --repository-name radiance-backend-image --force 2>/dev/null || true

                  # 2. Xóa DynamoDB Tables
                  aws dynamodb delete-table --table-name UserProfiles 2>/dev/null || true
                  aws dynamodb delete-table --table-name terraform_locks 2>/dev/null || true

                  # 3. Xóa các S3 Frontend Buckets (Tìm theo prefix radiance-frontend-)
                  for bucket in $(aws s3 ls | grep radiance-frontend | awk '{print $3}'); do
                    nuke_s3_bucket "$bucket"
                  done

                  # 4. Xóa Backend S3 (radiance-s3)
                  nuke_s3_bucket "radiance-s3"

                  # 5. Xóa IAM Role & Policy
                  aws iam delete-role-policy --role-name radiance_lambda_role --policy-name radiance_lambda_policy 2>/dev/null || true
                  aws iam delete-role --role-name radiance_lambda_role 2>/dev/null || true

                  echo "✅ Toàn bộ tài nguyên đã bị xóa sổ."
