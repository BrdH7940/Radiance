name: Backend — test, package & deploy

on:
    push:
        branches: [main]
        paths:
            - 'services/**'
    workflow_dispatch: {}

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: 'pip'
                  cache-dependency-path: services/cv-enhancer/requirements.txt

            - name: Install dependencies
              run: pip install -r services/cv-enhancer/requirements.txt

            - name: Run tests
              run: pytest services/cv-enhancer/tests/ -v

    deploy:
        needs: test
        runs-on: ubuntu-latest
        environment: env
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build, tag, and push image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: radiance-backend-image
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker build \
                    -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                    -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                    -f services/cv-enhancer/Dockerfile.lambda .

                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

            - name: Update Lambda function
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: radiance-backend-image
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  aws lambda update-function-code \
                    --function-name radiance-backend-api \
                    --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

                  aws lambda wait function-updated \
                    --function-name radiance-backend-api

                  echo "Lambda updated successfully with image: $IMAGE_TAG"

            - name: Sync Lambda environment variables
              env:
                  ANALYSIS_USER_ID: ${{ secrets.ANALYSIS_USER_ID }}
                  AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
                  AWS_XRAY_CONTEXT_MISSING: ${{ secrets.AWS_XRAY_CONTEXT_MISSING }}
                  CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
                  DYNAMODB_ANALYSIS_TABLE_NAME: ${{ secrets.DYNAMODB_ANALYSIS_TABLE_NAME }}
                  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
                  LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
                  LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
                  LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
                  LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
                  XRAY_DISABLED: ${{ secrets.XRAY_DISABLED }}
                  XRAY_SERVICE_NAME: ${{ secrets.XRAY_SERVICE_NAME }}
                  SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                  SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
              run: |
                  set -euo pipefail

                  # Fail fast: never overwrite Lambda env with missing required secrets.
                  missing=0
                  for v in GOOGLE_API_KEY ANALYSIS_USER_ID AWS_S3_BUCKET DYNAMODB_ANALYSIS_TABLE_NAME SQS_QUEUE_URL SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY SUPABASE_JWT_SECRET CORS_ALLOWED_ORIGINS; do
                    if [ -z "${!v:-}" ]; then
                      echo "Missing required secret/env: $v"
                      missing=1
                    fi
                  done
                  if [ "$missing" -ne 0 ]; then
                    echo "Aborting env sync to avoid wiping Lambda variables."
                    exit 1
                  fi

                  # Read current Lambda env so optional/empty values don't wipe existing keys.
                  CURRENT_VARS_JSON=$(aws lambda get-function-configuration \
                    --function-name radiance-backend-api \
                    | jq -c '.Environment.Variables // {}')

                  ENV_JSON=$(jq -n \
                    --argjson current "$CURRENT_VARS_JSON" \
                    --arg a   "$ANALYSIS_USER_ID" \
                    --arg b   "$AWS_S3_BUCKET" \
                    --arg bx  "$AWS_XRAY_CONTEXT_MISSING" \
                    --arg c   "$CORS_ALLOWED_ORIGINS" \
                    --arg d   "$DYNAMODB_ANALYSIS_TABLE_NAME" \
                    --arg e   "$GOOGLE_API_KEY" \
                    --arg ls1 "$LANGSMITH_API_KEY" \
                    --arg ls2 "$LANGSMITH_ENDPOINT" \
                    --arg ls3 "$LANGSMITH_PROJECT" \
                    --arg ls4 "$LANGSMITH_TRACING" \
                    --arg xr1 "$XRAY_DISABLED" \
                    --arg xr2 "$XRAY_SERVICE_NAME" \
                    --arg f   "$SQS_QUEUE_URL" \
                    --arg g   "$SUPABASE_URL" \
                    --arg h   "$SUPABASE_SERVICE_ROLE_KEY" \
                    --arg i   "$SUPABASE_JWT_SECRET" \
                    'def nonempty_only: with_entries(select(.value != "" and .value != null)); 
                     ($current + ({
                      ANALYSIS_USER_ID:$a,
                      AWS_S3_BUCKET:$b,
                      AWS_XRAY_CONTEXT_MISSING:$bx,
                      CORS_ALLOWED_ORIGINS:$c,
                      DYNAMODB_ANALYSIS_TABLE_NAME:$d,
                      GEMINI_MODEL:"gemini-2.5-flash",
                      GOOGLE_API_KEY:$e,
                      LANGSMITH_API_KEY:$ls1,
                      LANGSMITH_ENDPOINT:$ls2,
                      LANGSMITH_PROJECT:$ls3,
                      LANGSMITH_TRACING:$ls4,
                      XRAY_DISABLED:$xr1,
                      XRAY_SERVICE_NAME:$xr2,
                      SQS_QUEUE_URL:$f,
                      SUPABASE_URL:$g,
                      SUPABASE_SERVICE_ROLE_KEY:$h,
                      SUPABASE_JWT_SECRET:$i
                     } | nonempty_only)) as $vars
                     | {Variables: $vars}')

                  aws lambda update-function-configuration \
                    --function-name radiance-backend-api \
                    --environment "$ENV_JSON"

                  aws lambda wait function-updated \
                    --function-name radiance-backend-api

                  echo "Lambda environment variables synced."
