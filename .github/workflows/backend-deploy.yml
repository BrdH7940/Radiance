name: Backend — package & deploy (fast path)

on:
    push:
        paths:
            - 'services/**'
    workflow_dispatch: {} # manual trigger
    # Fast path: aws lambda update-function-code

jobs:
    package-and-deploy:
        runs-on: ubuntu-latest
        environment: env
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v4
            - name: Find changed services # Find the exactly changed services
              id: changed
              run: |
                  # Nếu là manual trigger, mặc định chọn service là 'radiance' (hoặc tên folder con của bạn)
                  if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                    echo "services=backend" >> $GITHUB_OUTPUT
                  else
                    git fetch --prune --unshallow 2>/dev/null || true
                    SERVICES=$(git --no-pager diff --name-only ${{ github.sha }} ${{ github.sha }}~1 -- services/ | awk -F/ '{print $2}' | sort -u)
                    
                    # Nếu chạy push nhưng không thấy service nào thay đổi, default về backend để an toàn hoặc báo lỗi
                    if [ -z "$SERVICES" ]; then SERVICES="backend"; fi
                    echo "services=$SERVICES" >> $GITHUB_OUTPUT
                  fi
            - name: Package service # Compress code to .zip
              if: steps.changed.outputs.services != ''
              run: |
                  SERVICE="$(echo "${{ steps.changed.outputs.services }}" | awk '{print $1}')"
                  echo "Packaging: $SERVICE"
                  bash ./scripts/package_lambda.sh services/$SERVICE ./.artifacts/$SERVICE.zip
                  ls -lh ./.artifacts
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}
            - name: Prepare ECR image metadata
              if: steps.changed.outputs.services != ''
              run: |
                  set -euo pipefail
                  SERVICE="$(echo "${{ steps.changed.outputs.services }}" | awk '{print $1}')"
                  echo "SERVICE=$SERVICE" >> "$GITHUB_ENV"

                  # Repo name can be provided via secret; fallback is OK for quick starts
                  REPO_NAME="${{ secrets.ECR_REPO_NAME }}"
                  if [ -z "$REPO_NAME" ]; then REPO_NAME="radiance-backend-image"; fi

                  ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
                  ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
                  ECR_URI="${ECR_REGISTRY}/${REPO_NAME}"
                  IMAGE_TAG="${GITHUB_SHA::8}"

                  echo "ECR_REGISTRY=$ECR_REGISTRY" >> "$GITHUB_ENV"
                  echo "ECR_URI=$ECR_URI" >> "$GITHUB_ENV"
                  echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

                  # Ensure ECR repository exists (no-op if it already exists)
                  aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 || \
                    aws ecr create-repository --repository-name "$REPO_NAME" >/dev/null
            - name: Login to Amazon ECR
              if: steps.changed.outputs.services != ''
              run: |
                  set -euo pipefail
                  aws ecr get-login-password --region "${{ secrets.AWS_REGION }}" | \
                    docker login --username AWS --password-stdin "$ECR_REGISTRY"
            - name: Build Docker image
              if: steps.changed.outputs.services != ''
              run: |
                  set -euo pipefail
                  docker build \
                    --build-arg "SERVICE=$SERVICE" \
                    -f services/Dockerfile \
                    -t "$ECR_URI:$IMAGE_TAG" \
                    services/
            - name: Push Docker image
              if: steps.changed.outputs.services != ''
              run: |
                  set -euo pipefail
                  docker push "$ECR_URI:$IMAGE_TAG"
            - name: Update Lambda (deploy image)
              if: steps.changed.outputs.services != ''
              env:
                  LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
                  SERVICE_LAMBDA_NAME: ${{ secrets.SERVICE_LAMBDA_NAME }}
                  AWS_REGION: ${{ secrets.AWS_REGION }}
              run: |
                  set -euo pipefail
                  SERVICE="$SERVICE"

                  # default function name (override with SERVICE_LAMBDA_NAME secret or repository variable)
                  FN_NAME="$SERVICE_LAMBDA_NAME"
                  if [ -z "$FN_NAME" ]; then FN_NAME="radiance-backend-api"; fi

                  # update lambda to use the pushed image
                  aws lambda update-function-code --function-name "$FN_NAME" --image-uri "$ECR_URI:$IMAGE_TAG"

                  # optionally inject LANGCHAIN_API_KEY (do NOT print secret)
                  if [ -n "$LANGCHAIN_API_KEY" ]; then
                    aws lambda update-function-configuration --function-name "$FN_NAME" --environment "Variables={LANGCHAIN_API_KEY=$LANGCHAIN_API_KEY}"
                  fi

            - name: Post-deploy smoke test # Healthcheck
              run: |
                  echo "Run a simple healthcheck against the Function URL if available"
                  # Example: curl -fsS "$${{ secrets.BACKEND_HEALTHCHECK_URL }}" || (echo 'healthcheck failed' && exit 1)
              env:
                  BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
