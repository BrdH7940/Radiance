name: Backend — package & deploy (fast path)

on:
    push:
        paths:
            - 'services/**'
    workflow_dispatch: {} # manual trigger
    # Fast path: aws lambda update-function-code

jobs:
    package-and-deploy:
        runs-on: ubuntu-latest
        environment: env
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build, tag, and push image to Amazon ECR
              env:
                  # Thêm ".outputs" vào đây
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: radiance-backend-image
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  # Kiểm tra xem registry có lấy được không trước khi build (để dễ debug)
                  if [ -z "$ECR_REGISTRY" ]; then echo "Error: ECR_REGISTRY is empty"; exit 1; fi

                  docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f services/Dockerfile .
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

            - name: Update Lambda (Ignore error if not exists)
              run: |
                  # Lệnh này sẽ lỗi ở lần đầu tiên khi Terraform chưa tạo Lambda, nhưng Image thì đã lên ECR rồi.
                  aws lambda update-function-code \
                    --function-name radiance-backend-api \
                    --image-uri ${{ steps.login-ecr.registry }}/radiance-backend-image:latest || echo "Lambda chưa tồn tại, chỉ push image lên ECR."
