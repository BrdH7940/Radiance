name: Backend — test, package & deploy

on:
    push:
        branches: [main]
        paths:
            - 'services/**'
    workflow_dispatch: {}

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: 'pip'
                  cache-dependency-path: services/cv-enhancer/requirements.txt

            - name: Install dependencies
              run: pip install -r services/cv-enhancer/requirements.txt

            - name: Run tests
              run: pytest services/cv-enhancer/tests/ -v

    deploy:
        needs: test
        runs-on: ubuntu-latest
        environment: env
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build, tag, and push image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: radiance-backend-image
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker build \
                    -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                    -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                    -f services/cv-enhancer/Dockerfile.lambda .

                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

            - name: Update Lambda function
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: radiance-backend-image
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  aws lambda update-function-code \
                    --function-name radiance-backend-api \
                    --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

                  aws lambda wait function-updated \
                    --function-name radiance-backend-api

                  echo "Lambda updated successfully with image: $IMAGE_TAG"
